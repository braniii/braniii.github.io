version: 2
updates:
  # npm packages (astro, tailwindcss, …) — all updates in a single grouped PR
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      npm:
        patterns:
          - "*"

  # GitHub Actions used in .github/workflows — grouped into a single PR
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
