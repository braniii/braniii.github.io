name: Update stats

on:
  schedule:
    # weekly, Mondays 04:17 UTC
    - cron: "17 4 * * 1"
  workflow_dispatch:

# Needed so the job can commit the refreshed stats.json back to the repo.
permissions:
  contents: write

concurrency:
  group: stats
  cancel-in-progress: false

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch download, star & citation stats
        env:
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCHOLAR_ID: "3Pz_4wwAAAAJ"
        run: |
          pip install scholarly
          python scripts/fetch_stats.py

      - name: Commit updated stats
        run: |
          if git diff --quiet -- src/data/stats.json; then
            echo "No stats change."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/stats.json
            git commit -m "chore: update download & citation stats"
            git push
          fi

      # A push made with GITHUB_TOKEN does not trigger the Pages workflow, so
      # build and deploy here to publish the refreshed numbers.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
